version: "3"
# runs the entire rudder pipeline with all supporting services (including rudder) in docker
# set .env such that all services in docker are talking to each other only
services:
  ewm-das:
    image: "us-docker.pkg.dev/covalent-project/network/ewm-das:latest"
    volumes:
      - ~/.ipfs:/root/.ipfs/
    container_name: ewm-das
    restart: on-failure
    entrypoint: |
      /bin/bash -l -c "
        touch proof_out_hex.txt;
        chmod +x proof_out_hex.txt;
        echo \"$PROOF_OUT_HEX\" > proof_out_hex.txt;
        xxd -r -p proof_out_hex.txt > proof_from_hex.out;
        chmod +x proof_from_hex.out;
        mv ./proof_from_hex.out /root/.ipfs/proof_from_hex.out;
        ./usr/local/bin/pinner --log-level debug --addr :5080;"
    expose:
      - "4001:4001"
      - "5080:5080"
    environment:
      # Pick one pin backend:
      #   - IPFS_RPC_URL  → self-hosted IPFS (Kubo), see the `ipfs` service below
      #   - FILEBASE_RPC_TOKEN → managed Filebase
      # If both are set, IPFS_RPC_URL wins.
      - FILEBASE_RPC_TOKEN=${FILEBASE_RPC_TOKEN}
      # - IPFS_RPC_URL=http://ipfs:5001/api/v0
      # - IPFS_RPC_TOKEN=                       # optional; only for auth-fronted Kubo
      # - DEDICATED_GATEWAY=http://ipfs:8080/   # point reads at the self-hosted gateway
      - PROOF_OUT_HEX=${PROOF_OUT_HEX}
    networks:
      - cxt-net
    ports:
      - "4001:4001"
      - "5080:5080"

  # Opt-in self-hosted IPFS daemon. Enable by setting IPFS_RPC_URL on ewm-das
  # above and adding `depends_on: [ipfs]`. Not started by default so the
  # existing Filebase-based CI flow continues to work unchanged.
  ipfs:
    image: ipfs/kubo:v0.32.1
    container_name: ewm-ipfs
    restart: on-failure
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - cxt-net
    ports:
      - "4002:4001"   # swarm (host port shifted to avoid clash with ewm-das)
      - "5001:5001"   # RPC API
      - "8080:8080"   # gateway
    profiles: ["selfhosted"]

  ewm-das-tester:
    image: "us-docker.pkg.dev/covalent-project/network/ewm-das:latest"
    depends_on:
      - ewm-das
    entrypoint: /root/.covalent/test/das-pinner-tester.sh
    networks:
      - cxt-net

volumes:
  ipfs-data:

networks:
  cxt-net:
